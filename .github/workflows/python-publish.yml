name: Publish Python Package

on:
  push:
    tags:
      - "v*.*.*"   # Only publish on version tags like v1.0.0

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pytest flake8 twine

      # 🔍 Lint (fail fast)
      - name: Lint code
        run: |
          flake8 src tests

      # 🧪 Tests
      - name: Run tests
        run: |
          pytest

      # 📦 Build package
      - name: Build package
        run: |
          python -m build

      # 🔐 Verify package before publishing
      - name: Check package
        run: |
          twine check dist/*

      # 🚀 Publish to PyPI
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/*
