name: Docker CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t threathunter-api .

      # 🔐 Scan image with Trivy
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: threathunter-api
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
