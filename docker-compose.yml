services:
  threathunter-api:
    build: .
    container_name: threathunter-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./threathunter.db
      - SYNC_ON_STARTUP=true
      - LOG_LEVEL=INFO
    volumes:
      - threathunter-data:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  threathunter-data:
